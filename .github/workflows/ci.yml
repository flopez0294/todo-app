name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # -------------------------
      # LINTING
      # -------------------------
      - name: Run ESLint
        run: npm run lint

      # -------------------------
      # TYPE CHECK (core/cli only)
      # -------------------------
      - name: Type check CLI + Core
        run: npx tsc --noEmit -p tsconfig.cli.json

      # -------------------------
      # TESTS
      # -------------------------
      - name: Run tests
        run: npm test

      # -------------------------
      # BUILD CHECK (renderer)
      # -------------------------
      - name: Build renderer (Vite)
        run: npm run build